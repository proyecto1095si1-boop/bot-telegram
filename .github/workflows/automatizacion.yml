name: Ejecucion Bots Financieros

on:
  schedule:
    # Lunes a Viernes a las 12:00 de Argentina (15:00 UTC) - Ideal para el Sniper Intradía
    - cron: '0 15 * * 1-5'
    # Lunes a Viernes a las 16:45 de Argentina (19:45 UTC) - Cierre de mercado
    - cron: '45 19 * * 1-5'
  workflow_dispatch: # Activa el botón para correrlo a mano

jobs:
  analisis-mercado:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas
        run: pip install yfinance pandas scikit-learn matplotlib requests lxml

      # --- ESCUADRÓN DE BOTS (CON SEGURO ANTI-FALLOS) ---

      - name: 1. Ejecutar Bot Swing (Corto Plazo)
        continue-on-error: true
        run: python bot_tactico_5dias.py

      - name: 2. Ejecutar Bot Estructural (Largo Plazo)
        continue-on-error: true
        run: python bot_estructural_1mes.py
        
      - name: 3. Ejecutar Radar Commodities (Macro)
        continue-on-error: true
        run: python bot_macro_global.py

      - name: 4. Ejecutar Sniper Intradía SMC (Day Trading)
        continue-on-error: true
        run: python bot_intradia_sniper.py

      - name: 5. Ejecutar Calendario de Balances
        continue-on-error: true
        run: python bot_calendario_macro.py

      - name: 6. Ejecutar Cazador de Dividendos
        continue-on-error: true
        run: python bot_dividendos.py

      - name: 7. Ejecutar Escáner de Gemas Ocultas
        continue-on-error: true
        run: python bot_gemas_ocultas.py
