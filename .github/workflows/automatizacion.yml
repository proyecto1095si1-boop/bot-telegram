name: Terminal Quant Global (Master)

on:
  schedule:
    # Lunes a Viernes a las 12:00 Arg (15:00 UTC) - Mitad de Rueda
    - cron: '0 15 * * 1-5'
    # Lunes a Viernes a las 16:45 Arg (19:45 UTC) - Cierre de Rueda
    - cron: '45 19 * * 1-5'
  workflow_dispatch: # Botón Manual

jobs:
  analisis-mercado:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas Quant
        run: pip install yfinance pandas scikit-learn matplotlib requests lxml

      # ==========================================
      # 🚀 ESCUADRÓN DE BOTS (ANTI-FALLOS ACTIVADO)
      # ==========================================

      - name: 1. Sniper Intradía (SMC)
        continue-on-error: true
        run: python bot_intradia_sniper.py

      - name: 2. Bot Swing (Corto Plazo 5d)
        continue-on-error: true
        run: python bot_tactico_5dias.py

      - name: 3. Bot Estructural (Largo Plazo + Merval ARS)
        continue-on-error: true
        run: python bot_estructural_1mes.py
        
      - name: 4. Radar Commodities (Macro)
        continue-on-error: true
        run: python bot_macro_global.py

      - name: 5. Monitor CEDEARs (Escudo CCL)
        continue-on-error: true
        run: python bot_cedears_ccl.py

      - name: 6. Radar Bonos Soberanos (Riesgo País)
        continue-on-error: true
        run: python bot_bonos_soberanos.py

      - name: 7. Cazador de Mega-Tendencias (ETFs)
        continue-on-error: true
        run: python bot_etf_megatendencias.py

      - name: 8. Escáner Gemas Ocultas (Screener)
        continue-on-error: true
        run: python bot_gemas_ocultas.py

      - name: 9. Calendario de Balances
        continue-on-error: true
        run: python bot_calendario_macro.py

      - name: 10. Cazador de Dividendos (Renta Pasiva)
        continue-on-error: true
        run: python bot_dividendos.py
